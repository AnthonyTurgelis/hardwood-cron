name: Strength Live Refresh

# Rebuilds the LIVE 2026 team-strength surface wnba_team_strength_live_2026 @
# kalman_live_2026_05_25 from the walk-forward Kalman series + Glicko RD + 2026
# standings (scripts/strength_live_refresh.py — port of cell_strength_live_02,
# delta v151, forward-build v152). The front-end 2026 power-ranking widget reads
# this table at its latest snapshot_date (build hw-v16-0525a).
#
# Idempotent per model_version: DELETE WHERE model_version + full rebuild from
# all played 2026 games. Same slate -> same rows (net no-op); as the slate
# advances, new snapshot_dates are appended under the SAME model_version. Other
# model_versions and wnba_power_rankings_v3 are never touched (coexist).
#
# CHAINED (delta v163 + v165): three ordered steps in one job —
#   1. games_score_feeder.py (v165, the LINCHPIN): fills played 2026 scores into
#      wnba_games from ESPN's scoreboard (match by game_id, fill NULL only,
#      idempotent). Without this the whole chain is inert — scores were frozen at
#      2026-05-14 with no feeder.
#   2. series_extend_refresh.py (v163): walk-forward EXTENDS the Kalman + Glicko-2
#      series (same model_versions) with the newly-scored games (APPEND-only).
#   3. strength_live_refresh.py (v151/v161): rebuilds the surface off the fresh
#      ratings.
# Order matters: scores land -> series re-estimate -> surface + front-end move.
#
# Runs daily 12:30 UTC — 30 min AFTER daily-rosters (12:00) so standings are fresh.
on:
  schedule:
    - cron: '30 12 * * *'   # daily 12:30 UTC, after daily-rosters
  workflow_dispatch:         # manual seed / re-trigger (v92 stale-SHA lesson)

concurrency:
  group: strength-live-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Feed played 2026 scores into wnba_games (ESPN) [runs FIRST]
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python scripts/games_score_feeder.py

      - name: Extend Kalman + Glicko-2 series (in-season ratings)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python scripts/series_extend_refresh.py

      - name: Run strength-live surface refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python scripts/strength_live_refresh.py
