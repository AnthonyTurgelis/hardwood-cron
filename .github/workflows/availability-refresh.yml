name: Availability Refresh

# Appends a fresh wnba_player_availability_current snapshot via the intl-aware
# accent cascade + 5-signal KEEP-UNION ghost filter
# (scripts/availability_refresh.py — port of cell_3_v3, delta v84). Runs a few
# minutes AFTER the BDL injury snapshotter so it consumes the latest injury
# state. Without this workflow computed_at re-freezes and
# wnba_forward_play_prob_log silently stalls (delta v78/v79). INSERT-only —
# never deletes prior snapshots.
#
# Registration-refresh touch: 2026-05-24 v92 — re-registers scheduler against
# new HEAD so post-v84-push runs use the intl-aware cascade. Without this YAML
# touch, scheduled triggers were stuck running scripts at the pre-v84 SHA
# (9760f9d5) despite main being at 56b9a5f (delta v91 stale-SHA finding).
on:
  schedule:
    - cron: '5,35 * * * *'  # twice hourly, 5 min after the */15 BDL ticks
  workflow_dispatch:

concurrency:
  group: availability-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run availability refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python scripts/availability_refresh.py
